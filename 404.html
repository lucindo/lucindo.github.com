<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 · Renato Lucindo</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' fill='none' stroke='%2322577c' stroke-width='3'/%3E%3C/svg%3E">
<script>
(function () {
  try {
    var t = localStorage.getItem('theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
})();
</script>
<style>
  :root {
    color-scheme: light dark;
    --paper: #fcfcfa;
    --ink: #16181a;
    --muted: #70757a;
    --accent: #22577c;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Charter, Georgia, serif;
    --sans: Seravek, "Gill Sans", "Gill Sans MT", "Trebuchet MS", Calibri, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --paper: #15181b;
      --ink: #e4e6e6;
      --muted: #8d939a;
      --accent: #85b5d4;
    }
  }
  :root[data-theme="dark"] {
    --paper: #15181b;
    --ink: #e4e6e6;
    --muted: #8d939a;
    --accent: #85b5d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--serif);
    background: var(--paper);
    color: var(--ink);
    font-size: 1.125rem;
    line-height: 1.55;
  }
  main {
    max-width: 40rem;
    margin: 0 auto;
    padding: clamp(3rem, 10vh, 7rem) 1.5rem 4rem;
  }
  .eyebrow {
    font-family: var(--sans);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--accent);
  }
  h1 {
    font-size: clamp(2.4rem, 8vw, 3.6rem);
    font-weight: 400;
    margin-top: 0.6rem;
    line-height: 1.1;
  }
  p.note { margin-top: 1rem; color: var(--muted); font-style: italic; }
  p.back { margin-top: 2.5rem; font-family: var(--sans); font-size: 0.78rem; letter-spacing: 0.06em; }
  p.back a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--muted); padding-bottom: 1px; }
  p.back a:hover { color: var(--accent); border-color: var(--accent); }
  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>
<main>
  <p class="eyebrow">lucindo.github.io</p>
  <h1>404</h1>
  <p class="note">There is no page at this address.</p>
  <p class="back"><a href="/">← back to the index</a></p>
</main>
</body>
</html>
